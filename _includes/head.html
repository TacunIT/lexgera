<head>
    <title>{{ page.title }}</title>
    <meta charset="utf-8" />
    <link rel="canonical" href="{{ page.url | absolute_url }}" />
    <link rel="icon" href="{{ '/assets/img/favicon.ico' | relative_url }}" type="image/x-icon" />
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
    <meta name="description" content="{{ page.excerpt }}" />
    <meta name="keyword" content="{{ page.keyword }}" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />

    <!-- Open Graph / Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image:alt" content="{{ t.azienda }}">
    <meta property="og:description" content="{{ page.excerpt }}" />
    <meta property="og:image" content="{{ page.og_image | relative_url }}" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="{{ t.azienda }}" />
    <meta property="og:title" content="{{ page.title }}" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="{{ page.url | absolute_url }}" />
</head>
